# =============================================================================
# CI/CD — runs on every PR, every push to main, and every vX.Y.Z tag.
#
# Goals:
#   • Catch lint / type / format errors before review.
#   • Run unit + integration (real Postgres) tests on every change.
#   • Keep PRs honest — npm audit gates on high/critical CVEs.
#   • Build the production image on every change; PUBLISH a multi-arch
#     (linux/amd64 + linux/arm64) image to the GitHub Container Registry
#     (ghcr.io) once the tests pass on main / tags.
#
# Publishing needs no secrets: it authenticates to ghcr.io with the built-in
# GITHUB_TOKEN (the docker job grants itself `packages: write`). PRs build but
# never push, so fork PRs are safe.
#
# Performance: test jobs run in parallel and reuse actions/setup-node's npm
# cache; the image build reuses a Buildx layer cache (type=gha).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default permissions for all jobs. Each job can request more if needed.
# Reading is fine for almost everything; writing requires explicit grant.
permissions:
  contents: read

env:
  NODE_VERSION: "24"
  IMAGE_NAME: ghcr.io/powerdns-authadmin/powerdns-authadmin

jobs:
  # -------------------------------------------------------------------------
  # Lint + format + typecheck
  # -------------------------------------------------------------------------
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

  # -------------------------------------------------------------------------
  # Unit tests
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  # -------------------------------------------------------------------------
  # Integration tests — true end-to-end against a real running stack.
  #
  # The suite (tests/integration/setup.ts) hits a live app's /healthz + its
  # Postgres and FAILS LOUD if either is missing, so it can't run against a
  # bare DB. `npm run test:integration` (tests/integration/run.sh) is the
  # self-contained runner: it boots the full multi-topology stack via docker
  # compose (the app image is built fresh from this checkout), --waits for
  # health, runs vitest against it, then tears the stack down. Docker +
  # docker compose are preinstalled on GitHub-hosted runners.
  # -------------------------------------------------------------------------
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Every-push integration runs against ONE pinned PowerDNS image (the same
    # one the demo stack ships) to keep PR/main CI fast. The FULL supported
    # range (4.6 → 5.0) is exercised by the separate `pdns-compat.yml` workflow
    # on minor/major releases (+ monthly + manual), which also publishes the
    # per-version compatibility badges. See that workflow for the why.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration suite (full stack via docker compose, PDNS 4.9)
        # docker-compose-combined.yml requires the two secrets via ${VAR:?} at
        # compose INTERPOLATION time (the test override then replaces them with
        # deterministic per-container test values). PDNS_AUTH_IMAGE selects the
        # PowerDNS image.
        env:
          APP_SECRET_KEY: kQNFuuPJLRHE1qsbUgXQDMAcgsg2kxVip34yE9ydwS8=
          APP_ENCRYPTION_KEY: n+ZccvIUcG6XoJ2qoUtaPtk7tme1n5NbT3QXkiHBs4M=
          PDNS_AUTH_IMAGE: powerdns/pdns-auth-49:latest
        run: npm run test:integration

  # -------------------------------------------------------------------------
  # Security: npm audit gate on high/critical CVEs in production deps only.
  # Renovate handles dev-dep updates separately; we don't want a CVE in a
  # build-time-only package to block a release.
  # -------------------------------------------------------------------------
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit (production deps only)
        run: npm audit --audit-level=high --omit=dev

  # -------------------------------------------------------------------------
  # Build the production image and publish it to GHCR (ghcr.io).
  #
  #   • Pull request  → build linux/amd64 only, NO push (proves the Dockerfile
  #     still works; fork PRs can't write packages anyway).
  #   • Push to main  → build linux/amd64 + linux/arm64, push `latest` + a
  #     short-sha tag.
  #   • Tag vX.Y.Z    → also push the semver tags `X.Y.Z` and `X.Y`.
  #
  # arm64 is built under QEMU emulation (one simple job); the Buildx layer
  # cache keeps repeat runs quick. Auth uses the built-in GITHUB_TOKEN — no
  # registry secrets to manage.
  # -------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [static-checks, test, integration-test]
    # GITHUB_TOKEN needs package-write to push to ghcr.io; reads stay default.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          # PRs validate amd64 only (fast); main/tags publish both arches.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake build provenance into the image so the UI can show the running
          # commit (sidebar version chip → /commit/<sha>, Docs → /tree/<sha>).
          # APP_RELEASE is "true" only for vX.Y.Z tag builds, which keep the
          # clean release/tag links.
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_RELEASE=${{ github.ref_type == 'tag' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the published manifest to just the two arches (no extra
          # "unknown/unknown" attestation entries cluttering the package).
          # metadata-action already sets org.opencontainers.image.source from
          # github.repository, which links the GHCR package to this repo (so
          # its package page shows the repo README).
          provenance: false
