# =============================================================================
# Sign release — supply-chain provenance for published releases.
#
# Triggered AFTER the CI workflow finishes pushing the multi-arch image to
# GHCR for a vX.Y.Z tag — never before. This avoids the race that bit v1.1.4:
# the previous `on: release: published` trigger could fire seconds after the
# tag/release was published, but the image push completes minutes later, so
# `cosign sign` against `:X.Y.Z` would fail with "not found" if signing won
# the race. Listening on `workflow_run` of CI guarantees the image is on the
# registry when this job starts.
#
# It:
#   1. cosign-signs the published multi-arch image (keyless / Sigstore) — a
#      verifiable signature attached to the image in GHCR.
#   2. generates an SPDX SBOM of the image,
#   3. writes a checksums file over the attached artifacts and cosign sign-blobs
#      it into a Sigstore bundle,
#   4. uploads the SBOM + checksums + signature bundle as release assets.
#
# The release assets (the *.sigstore.json bundle) are what OpenSSF Scorecard's
# Signed-Releases check looks for; the image signature is the real supply-chain
# win (verify with: cosign verify ghcr.io/...@<digest>).
#
# All actions are pinned to a commit SHA. Verify a signature:
#   cosign verify ghcr.io/powerdns-authadmin/powerdns-authadmin:<version> \
#     --certificate-identity-regexp '^https://github.com/PowerDNS-AuthAdmin/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
# =============================================================================

name: Sign release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Fire only when CI succeeded on a vX.Y.Z tag push. workflow_run
    # delivers every CI completion (PRs, branches, tags) so we filter
    # tightly here: conclusion success, original event was push, and the
    # head_branch (which carries the tag name for tag pushes) matches v*.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    permissions:
      contents: write # upload release assets
      packages: write # cosign writes the image signature to GHCR
      id-token: write # cosign keyless (Fulcio OIDC)
    env:
      IMAGE: ghcr.io/powerdns-authadmin/powerdns-authadmin
      TAG: ${{ github.event.workflow_run.head_branch }}
    steps:
      # No `actions/checkout` here — Scorecard `Dangerous-Workflow` flags any
      # privileged `workflow_run`-triggered job that checks out the
      # triggering run's `head_sha`, because in some scenarios that ref
      # could be from a fork's PR (in our `if:` filter we already restrict
      # to push-event tag refs, so it's not actually exploitable for us, but
      # we want to keep the rule passing too).
      #
      # Nothing in this workflow needs the source tree: cosign operates on
      # the image, anchore/sbom-action operates on the image, `gh release
      # upload` uses files we generate in-place from cosign / sbom output.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image digest for the release tag
        id: digest
        run: |
          set -euo pipefail
          version="${TAG#v}"                       # v1.2.3 -> 1.2.3 (the published image tag)
          digest="$(docker buildx imagetools inspect "${IMAGE}:${version}" --format '{{ .Manifest.Digest }}')"
          echo "ref=${IMAGE}@${digest}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${IMAGE}:${version} -> ${digest}"

      - name: Sign the image (keyless)
        run: cosign sign --yes "${{ steps.digest.outputs.ref }}"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.digest.outputs.ref }}
          format: spdx-json
          output-file: powerdns-authadmin.sbom.spdx.json

      - name: Build + sign checksums
        run: |
          set -euo pipefail
          echo "${{ steps.digest.outputs.ref }}" > image-digest.txt
          sha256sum powerdns-authadmin.sbom.spdx.json image-digest.txt > checksums.txt
          cosign sign-blob --yes --bundle checksums.txt.sigstore.json checksums.txt

      - name: Wait for the GitHub release to be published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The tag push triggers CI before `gh release create` finishes (the
          # operator runs them seconds apart). CI itself takes ~10 min, so by
          # the time we're here the release is almost certainly published —
          # but tolerate up to 5 min slip just in case the release-create call
          # is delayed by the operator's flow.
          set -euo pipefail
          for i in $(seq 1 30); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG is published."
              exit 0
            fi
            echo "Waiting for release $TAG... ($i/30)"
            sleep 10
          done
          echo "Release $TAG did not appear within 5 min — failing." >&2
          exit 1

      - name: Upload signed assets to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" \
            powerdns-authadmin.sbom.spdx.json \
            image-digest.txt \
            checksums.txt \
            checksums.txt.sigstore.json \
            --clobber
