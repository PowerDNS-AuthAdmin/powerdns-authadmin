# docker/pdns/primary.conf — PowerDNS Authoritative config for the Primary node.
# Mounted at /etc/powerdns/pdns.conf in the official powerdns/pdns-auth image.
#
# Replication wiring lives in `also-notify` + `allow-axfr-ips` below. The
# compose file pins each container to a static IP on a /24, so we can list
# the secondary IPs literally — PDNS' supermaster table on each secondary
# matches these IPs to grant the auto-secondary flow.

launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite
# DNSSEC: let the gsqlite3 backend read/write the cryptokeys + domainmetadata
# tables so zones can be secured (online signing) and served signed. Without
# this, adding a cryptokey via the API fails and zones never sign.
gsqlite3-dnssec=yes

local-address=0.0.0.0
local-port=53

# HTTP API
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0
api=yes
# api-key is provided per-container via the compose `command:` override so
# the same conf file is reusable; the value here is just a placeholder.
api-key=changeme

# This node is a Primary — accepts writes, sends NOTIFY to Secondaries.
primary=yes

# NOTIFY every Secondary on the demo network whenever a zone changes.
# Static IPs come from the docker-compose `pdnsnet` subnet (172.30.0.0/24).
also-notify=172.30.0.11:53,172.30.0.12:53,172.30.0.13:53

# Allow AXFR from any IP on the demo network.
allow-axfr-ips=172.30.0.0/24
