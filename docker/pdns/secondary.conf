# docker/pdns/secondary.conf — PowerDNS Authoritative config for Secondary nodes.
# Mounted at /etc/powerdns/pdns.conf in the official powerdns/pdns-auth image.
#
# Auto-secondary (a.k.a. supermaster) flow: when this node receives a
# NOTIFY for an unknown zone from one of the IPs registered in its local
# `supermasters` table, it auto-creates the slave zone and AXFRs the
# contents from that IP. The compose init container inserts the
# Primary's static IP into `supermasters` once at first boot.

launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite
# DNSSEC: required so a Secondary can store + serve the presigned RRSIG/DNSKEY
# records it receives over AXFR from a signed Primary (it auto-detects the
# zone as presigned and serves the signatures as-is — it holds no keys itself).
gsqlite3-dnssec=yes

local-address=0.0.0.0
local-port=53

# HTTP API
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0
api=yes
# api-key overridden per-container via the compose `command:` (placeholder).
api-key=changeme

# This node is a read-only Secondary.
primary=no
secondary=yes

# Honour the supermasters table — auto-creates slave zones on NOTIFY
# from registered IPs.
autosecondary=yes

# Pull AXFR every 15 s so the demo sync chip flips green quickly. Production
# defaults are 60 s.
xfr-cycle-interval=15

# Accept NOTIFY from anywhere on the demo network.
allow-notify-from=172.30.0.0/24
