# docker/pdns/peer.conf - PowerDNS Authoritative config for a peer node in
# a multi-primary cluster. Every peer is writable; replication happens at
# the BACKEND layer (a shared MariaDB in the demo compose stack), not via
# PDNS' built-in NOTIFY+AXFR.

launch=gmysql
gmysql-host=mariadb
gmysql-port=3306
gmysql-dbname=pdns
gmysql-user=pdns
gmysql-password=pdns-pw
# DNSSEC: enable the gmysql backend's cryptokeys/domainmetadata support so
# cluster peers can secure + serve signed zones (shared MariaDB store).
gmysql-dnssec=yes

local-address=0.0.0.0
local-port=53

# HTTP API
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0
api=yes
# api-key overridden per-container via the compose `command:` (placeholder).
api-key=changeme

# Every peer is a writable primary. No NOTIFY needed - peers share the
# backend, so a write applied via any peer's API is visible to every
# other peer's API on the next read.
primary=yes
