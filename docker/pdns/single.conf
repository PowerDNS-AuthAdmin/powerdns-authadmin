# docker/pdns/single.conf - standalone PowerDNS Authoritative.
# Mounted at /etc/powerdns/pdns.conf in the official powerdns/pdns-auth-49
# image. No secondaries, no cluster - just a single-instance backend with
# its own local gsqlite3 store.

launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite
# DNSSEC: enable the gsqlite3 backend's cryptokeys/domainmetadata support so
# zones can be secured (online signing) via the API and served signed.
gsqlite3-dnssec=yes

local-address=0.0.0.0
local-port=53

# HTTP API
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0
api=yes
# api-key overridden per-container via the compose `command:` (placeholder).
api-key=changeme

# Writable; nothing to notify (no Secondaries in this topology).
primary=yes
